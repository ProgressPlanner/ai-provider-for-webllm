name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: PHP lint & coding standards
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["7.4", "8.2", "8.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer

      - name: Lint PHP files for syntax errors
        run: find plugin.php src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Install dependencies
        if: matrix.php-version == '8.2'
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        if: matrix.php-version == '8.2'
        run: composer lint
