name: Coding Standards

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  phpcs:
    name: PHPCS (PSR-12 + PHP compatibility)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHP CodeSniffer
        run: composer lint
