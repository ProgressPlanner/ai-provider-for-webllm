name: Playground preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Comment Playground link
    runs-on: ubuntu-latest
    # Fork PRs get a read-only token and cannot comment; skip them.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Build link and comment
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const blueprint = {
              $schema: "https://playground.wordpress.net/blueprint-schema.json",
              preferredVersions: { php: "8.3", wp: "nightly" },
              login: true,
              steps: [
                {
                  step: "installPlugin",
                  pluginData: {
                    resource: "url",
                    url: `https://github-proxy.com/proxy/?repo=${repo}&branch=${branch}`,
                  },
                  options: { activate: true },
                },
              ],
              landingPage: "/wp-admin/options-general.php?page=ai-provider-webllm",
            };
            const url =
              "https://playground.wordpress.net/#" +
              encodeURIComponent(JSON.stringify(blueprint));

            const marker = "<!-- playground-preview -->";
            const body = [
              marker,
              "### 🛝 WordPress Playground preview",
              "",
              `[**Open this PR in WordPress Playground →**](${url})`,
              "",
              "Spins up a throwaway WordPress with this branch's plugin active and lands on **Settings → WebLLM**.",
              "",
              "> Note: Playground has no WebGPU, so model inference will not run — this is for reviewing the admin UI and activation only.",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
